<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal To-Do List</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="topbar"></section>

    <section class="main">
        <div class="sidebar-left">
            
            <div class="sidebar-section">
                <div class="section-title">VIEWS</div>
                <div class="side-row active">
                    <span class="glyph">◆</span>
                    <span class="label">Today</span>
                    <span class="count">4</span>
                </div>
                <div class="side-row">
                    <span class="glyph">▷</span>
                    <span class="label">Upcoming</span>
                    <span class="count">3</span>
                </div>
                <div class="side-row">
                    <span class="glyph">▢</span>
                    <span class="label">Inbox</span>
                    <span class="count">8</span>
                </div>
                <div class="side-row">
                    <span class="glyph">✓</span>
                    <span class="label">Completed</span>
                    <span class="count">142</span>
                </div>
            </div>
            
            <div class="sidebar-section">
                <div class="section-title">PROJECTS</div>
                <div class="side-row">
                    <span class="glyph"><span class="dot" style="background:#22d3ee"></span></span>
                    <span class="label">Algorithms</span>
                    <span class="count">7</span>
                </div>
                <div class="side-row">
                    <span class="glyph"><span class="dot" style="background:#a78bfa"></span></span>
                    <span class="label">Distributed</span>
                    <span class="count">4</span>
                </div>
                <div class="side-row">
                    <span class="glyph"><span class="dot" style="background:#34d399"></span></span>
                    <span class="label">OS</span>
                    <span class="count">3</span>
                </div>
                <div class="side-row">
                    <span class="glyph"><span class="dot" style="background:#fb923c"></span></span>
                    <span class="label">Capstone</span>
                    <span class="count">12</span>
                </div>
                <div class="side-row">
                    <span class="glyph"><span class="dot" style="background:#fbbf24"></span></span>
                    <span class="label">Career</span>
                    <span class="count">5</span>
                </div>
                <div class="side-row">
                    <span class="glyph"><span class="dot" style="background:#f472b6"></span></span>
                    <span class="label">Personal</span>
                    <span class="count">9</span>
                </div>
                <div class="side-row add-new">
                    <span class="glyph">+</span>
                    <span class="label">NEW PROJECT</span>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-title">TAGS</div>
                <div class="tags-container">
                    <span class="tag">#hard</span>
                    <span class="tag">#graded</span>
                    <span class="tag">#reading</span>
                    <span class="tag">#meeting</span>
                    <span class="tag">#team</span>
                    <span class="tag">#lab</span>
                    <span class="tag">#health</span>
                    <span class="tag">#daily</span>
                    <span class="tag">#internship</span>
                    <span class="tag">#deadline</span>
                    <span class="tag">#bill</span>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-title">STREAK</div>
                <div class="streak-box">
                    <div class="streak-header">
                        <span class="streak-num">23</span>
                        <span class="streak-text">DAY STREAK</span>
                    </div>
                    <div class="streak-chart">
                        <div class="bar-group"><div class="bar" style="height: 100%;"></div><span>M</span></div>
                        <div class="bar-group"><div class="bar" style="height: 100%;"></div><span>T</span></div>
                        <div class="bar-group"><div class="bar" style="height: 100%;"></div><span>W</span></div>
                        <div class="bar-group"><div class="bar" style="height: 70%; opacity: 0.5;"></div><span>T</span></div>
                        <div class="bar-group"><div class="bar" style="height: 100%;"></div><span>F</span></div>
                        <div class="bar-group"><div class="bar" style="height: 40%; background: #3f3f46;"></div><span>S</span></div>
                        <div class="bar-group"><div class="bar" style="height: 100%;"></div><span>S</span></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="content"></div>
        <div class="sidebar-right"></div>
    </section>
</body>
</html>
